name: LowPE
description: >-
  Low P/E ratio selection strategy. Selects the N companies with the lowest
  positive P/E ratio within [min_pe, max_pe], weighted equally. Uses the
  monthly-snapshot P/E (f_pe_ratio_dyn, computed with the actual month-end
  price). Requires the CVM fundamentals monthly snapshot (fundamentals_monthly
  table) to be populated by running the CVM pipeline.
kind: rank_and_hold
rebalance: ME
needs_fundamentals: true
universe:
  min_adtv: 1000000
  min_price: 1.0
signal:
  # Earnings yield = 1/PE (higher = cheaper). The range is the [min_pe, max_pe]
  # band inverted: PE in [1, 30] <=> yield in [1/30, 1].
  expr: "1.0 / f_pe_ratio_dyn"
  range: [0.03333333333333333, 1.0]
  apply_glitch: false
selection:
  top_n: 10
  min_names: 3
  dedup_roots: true   # one share class per company (fundamentals are per-company)
weighting: equal
